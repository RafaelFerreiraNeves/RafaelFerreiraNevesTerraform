name: "Terraform"

on:
  push:
    branches: ["main"]
    paths: ["SRC/**"]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ AKIAYLCX75C55NOHDJNF }}
          aws-secret-access-key: ${{ 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 }}

      - name: Terraform Init
        working-directory: ./SRC
        run: terraform init

      - name: Terraform Apply
        working-directory: ./SRC
        run: terraform apply --auto-approve
